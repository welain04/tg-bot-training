name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly API token
        run: flyctl auth whoami

      # Deploy-токен не может поднять remote builder Fly.io.
      # Собираем образ на runner GitHub и пушим в registry.fly.io.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly Docker registry
        run: flyctl auth docker

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: registry.fly.io/dental-booking-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Fly.io
        run: flyctl deploy --image registry.fly.io/dental-booking-bot:${{ github.sha }} --app dental-booking-bot --yes
